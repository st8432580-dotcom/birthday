<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>З Днем Народження, Красуне! ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffeaa7, #ffb8b8, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #4a4a4a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 154, 158, 0.3);
            width: 100%;
            max-width: 400px;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Налаштування для галереї, щоб зручно скролилась на смартфонах */
        .card.gallery-mode {
            max-width: 500px;
            max-height: 92vh;
            overflow-y: auto;
            padding: 30px 20px;
        }

        /* Стильний тонкий скролбар для галереї */
        .card.gallery-mode::-webkit-scrollbar {
            width: 6px;
        }
        .card.gallery-mode::-webkit-scrollbar-thumb {
            background-color: rgba(255, 117, 140, 0.3);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #ff6b81;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            line-height: 1.2;
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #636e72;
            line-height: 1.4;
        }

        .warning-text {
            font-size: 1.1rem;
            color: #ee5253;
            font-weight: bold;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.96); opacity: 0.8; }
            50% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(0.96); opacity: 0.8; }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
            width: 100%;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            width: 45%;
        }

        .btn-yes:hover {
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #ffeaa7;
            color: #d63031;
            width: 45%;
            position: absolute;
            right: 5%;
            z-index: 999;
            will-change: top, left;
        }

        .hidden {
            display: none !important;
        }

        .congrats-title {
            font-size: 2.2rem;
            color: #ff4757;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-style: italic;
        }

        .photo-stream {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 10px;
        }

        .photo-card {
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        /* Легкий хаотичний нахил карток для ефекту розкиданих фотографій */
        .photo-card:nth-child(1) { transform: rotate(1.5deg); }
        .photo-card:nth-child(2) { transform: rotate(-2deg); }
        .photo-card:nth-child(3) { transform: rotate(2deg); }
        .photo-card:nth-child(4) { transform: rotate(-1.5deg); }
        .photo-card:hover { transform: rotate(0deg) scale(1.02); }

        .photo-card img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            object-fit: cover;
        }

        .photo-desc {
            font-size: 1.1rem;
            color: #ff6b81;
            font-weight: 500;
            margin-top: 12px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="card" id="quiz-card">
        <h1>З Днем Народження! 🌸</h1>
        <p>Тобі вже виповнилося 17?</p>
        <div class="warning-text">💖 Не натискай ТАК!</div>
        
        <div class="btn-container">
            <button class="btn btn-yes" id="yes-btn">Так</button>
            <button class="btn btn-no" id="no-btn">Ні</button>
        </div>
    </div>

    <div class="card hidden" id="congrats-card">
        <h1 class="congrats-title">Урааа! ✨</h1>
        <p class="sub-title">Ти все одно натиснула "Так"! Найкраща! 💖</p>
        
        <div class="photo-stream">
            
            <div class="photo-card">
                <img src="photo1.jpg" alt="Твоє фото 1">
                <div class="photo-desc">Найкрасивіша іменинниця! 😍</div>
            </div>

            <div class="photo-card">
                <img src="photo2.jpg" alt="Твоє фото 2">
                <div class="photo-desc">Завжди залишайся такою ж життєрадісною! ✨</div>
            </div>

            <div class="photo-card">
                <img src="photo3.jpg" alt="Твоє фото 3">
                <div class="photo-desc">Дивись, ти тут як обезьянка 🐒😂</div>
            </div>

            <div class="photo-card">
                <img src="photo4.jpg" alt="Твоє фото 4">
                <div class="photo-desc">А тут ти зовсім маленька ще була 🥺 Малеча 🥰</div>
            </div>

        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const quizCard = document.getElementById('quiz-card');
        const congratsCard = document.getElementById('congrats-card');

        function moveButton(e) {
            if (e) e.preventDefault();

            const padding = 40; 
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            let randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('touchstart', moveButton, { passive: false });
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);

        yesBtn.addEventListener('click', () => {
            quizCard.classList.add('hidden');
            congratsCard.classList.remove('hidden');
            congratsCard.classList.add('gallery-mode');
            
            noBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
